name: release

# Publishes Linux installers (.deb, .rpm) built via electron-forge make and
# attaches them to a GitHub Release. Normal CI in `ci.yml` only validates
# `electron-forge package` and is intentionally left untouched.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# `gh release create` / `gh release upload` need write access to releases,
# which `contents: write` grants on the built-in GITHUB_TOKEN. No custom
# secret is required.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: linux installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Guard: a pushed `vX.Y.Z` tag must match `package.json` version `X.Y.Z`.
      # Local packaging bumps `package.json` via `npm run package:patch|minor`
      # (or `make:patch|minor`) but never tags; tagging is explicit. This
      # check fails fast if someone tags a commit whose version wasn't bumped.
      # Skipped on `workflow_dispatch` since there's no tag to compare.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(jq -r .version package.json)"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ${TAG} implies version ${TAG_VERSION}, but package.json is ${PKG_VERSION}." >&2
            echo "Bump package.json (e.g. 'npm run package:patch' locally) and re-tag the updated commit." >&2
            exit 1
          fi
          echo "Tag ${TAG} matches package.json version ${PKG_VERSION}."

      # Forge's Linux makers shell out to system tooling:
      #   - MakerDeb  → dpkg / fakeroot
      #   - MakerRpm  → rpmbuild (provided by the `rpm` package on Ubuntu)
      # ubuntu-latest ships dpkg + fakeroot by default; rpmbuild is not.
      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm fakeroot dpkg

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Make
        run: npm run make

      # Always keep artifacts on the Actions run for debugging, even on a
      # workflow_dispatch (no tag, so the release-upload step is skipped).
      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archidev-flow-linux-make
          path: out/make/**
          if-no-files-found: ignore
          retention-days: 14

      # Tag builds (`push` to `refs/tags/v*`) are the only ones that publish
      # to a GitHub Release. `workflow_dispatch` runs produce artifacts only.
      - name: Publish to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi

          mapfile -t ASSETS < <(find out/make -type f \( -name '*.deb' -o -name '*.rpm' \))
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No .deb or .rpm artifacts found under out/make" >&2
            exit 1
          fi

          printf 'Uploading %s\n' "${ASSETS[@]}"
          gh release upload "$TAG" "${ASSETS[@]}" --clobber
